<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 專屬助教</title>
    <!-- 引入 Tailwind CSS 美化介面 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Marked.js 用來解析 Dify 回傳的 Markdown 格式 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* 隱藏捲軸但保留滾動功能 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* Markdown 樣式修正 */
        .markdown-body p { margin-bottom: 0.5rem; }
        .markdown-body a { color: #2563eb; text-decoration: underline; }
        .markdown-body strong { font-weight: bold; }
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col items-center justify-center p-4">

    <!-- 聊天室主體 -->
    <div class="w-full max-w-2xl bg-white rounded-2xl shadow-xl flex flex-col h-[85vh] overflow-hidden">
        
        <!-- 標題列 -->
        <div class="bg-blue-600 text-white p-4 text-center font-bold text-lg shadow-md z-10">
            🤖 Dify AI 智能助理
        </div>

        <!-- 對話顯示區 -->
        <div id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-4 bg-gray-50 no-scrollbar">
            <!-- 預設歡迎訊息 -->
            <div class="flex justify-start">
                <div class="bg-white text-gray-800 p-3 rounded-2xl rounded-tl-none shadow-sm max-w-[80%] border border-gray-200">
                    您好！我是您的專屬 AI 助理。您可以詢問我任何關於知識庫的內容喔！
                </div>
            </div>
        </div>

        <!-- 輸入區 -->
        <div class="p-4 bg-white border-t border-gray-200 flex gap-2">
            <input type="text" id="message-input" class="flex-1 border border-gray-300 rounded-full px-4 py-2 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500" placeholder="輸入您的問題..." onkeypress="handleKeyPress(event)">
            <button id="send-btn" onclick="sendMessage()" class="bg-blue-600 hover:bg-blue-700 text-white rounded-full p-2 w-10 h-10 flex items-center justify-center transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5" />
                </svg>
            </button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        // 產生一個隨機的使用者 ID，讓 Dify 能記住這次對話脈絡
        const userId = 'user_' + Math.random().toString(36).substring(2, 9);

        // 處理 Enter 鍵發送
        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        }

        // 滾動到最底部
        function scrollToBottom() {
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // 新增訊息氣泡到畫面上
        function appendMessage(sender, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'}`;
            
            const bubbleDiv = document.createElement('div');
            if (sender === 'user') {
                bubbleDiv.className = 'bg-blue-600 text-white p-3 rounded-2xl rounded-tr-none shadow-sm max-w-[80%] break-words';
                bubbleDiv.textContent = text;
            } else {
                bubbleDiv.className = 'bg-white text-gray-800 p-3 rounded-2xl rounded-tl-none shadow-sm max-w-[80%] border border-gray-200 markdown-body break-words';
                // 使用 marked.js 解析 Dify 回傳的 Markdown
                bubbleDiv.innerHTML = marked.parse(text);
            }
            
            msgDiv.appendChild(bubbleDiv);
            chatBox.appendChild(msgDiv);
            scrollToBottom();
        }

        // 發送訊息給後端 API
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            // 1. 顯示使用者訊息
            appendMessage('user', message);
            messageInput.value = '';
            messageInput.disabled = true;
            sendBtn.disabled = true;

            // 2. 顯示等待動畫 (三個點)
            const loadingId = 'loading-' + Date.now();
            const loadingDiv = document.createElement('div');
            loadingDiv.id = loadingId;
            loadingDiv.className = 'flex justify-start';
            loadingDiv.innerHTML = `<div class="bg-gray-100 text-gray-500 p-3 rounded-2xl rounded-tl-none shadow-sm max-w-[80%]">思考中...</div>`;
            chatBox.appendChild(loadingDiv);
            scrollToBottom();

            try {
                // 3. 呼叫我們部署在 Vercel 上的 Python API
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: message,
                        user_id: userId
                    })
                });

                const data = await response.json();
                
                // 移除等待動畫
                document.getElementById(loadingId).remove();

                if (response.ok) {
                    appendMessage('ai', data.reply);
                } else {
                    appendMessage('ai', `⚠️ 發生錯誤：${data.detail || '未知錯誤'}`);
                }
            } catch (error) {
                document.getElementById(loadingId).remove();
                appendMessage('ai', `⚠️ 連線失敗，請檢查網路或後端服務。(${error.message})`);
            } finally {
                messageInput.disabled = false;
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }
    </script>
</body>
</html>
